<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Handsextant MVP</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="instrument" aria-label="Sextanten-Simulator">
        <header class="topbar">
          <div>
            <p class="eyebrow">MVP 3</p>
            <h1>Sextant Simulation</h1>
          </div>
        </header>

        <div class="sky-frame" id="skyFrame">
          <div class="azimuth-scale" id="azimuthScale"></div>
          <div class="world-horizon" id="worldHorizon"></div>
          <div class="sky-objects" id="worldObjects" aria-hidden="true"></div>
          <div class="scope" aria-label="Blick durch den Sextanten">
            <div class="scope-pane scope-direct">
              <div class="scope-below-horizon" id="directBelowHorizon"></div>
              <div class="scope-horizon" id="directHorizon"></div>
              <div class="scope-objects" id="directScopeObjects" aria-hidden="true"></div>
            </div>
            <div class="scope-pane scope-mirror">
              <div class="scope-below-horizon" id="mirrorBelowHorizon"></div>
              <div class="scope-horizon" id="mirrorHorizon"></div>
              <div class="scope-objects" id="mirrorScopeObjects" aria-hidden="true"></div>
            </div>
            <div class="scope-divider" aria-hidden="true"></div>
            <div class="reticle" aria-hidden="true"></div>
          </div>
        </div>

        <div class="status-strip">
          <div>
            <span>Blick</span>
            <strong id="viewReadout">Az 000 deg / Alt 00 deg</strong>
          </div>
          <div>
            <span id="targetLabel">Sonne</span>
            <strong id="targetReadout">Az 126 deg / Alt 38 deg</strong>
          </div>
        </div>
      </section>

      <section class="target-picker" aria-label="Gestirnauswahl">
        <label>
          Gestirn
          <select id="bodySelect"></select>
        </label>
        <button id="toggleSkyLabels" type="button" aria-pressed="false">Namen anzeigen</button>
      </section>

      <section class="controls" aria-label="Bedienung">
        <div class="control-group">
          <label for="azimuth">Blick horizontal</label>
          <input id="azimuth" type="range" min="0" max="359" value="92">
        </div>

        <div class="control-group">
          <label for="altitude">Blick vertikal</label>
          <input id="altitude" type="range" min="-10" max="80" step="0.5" value="18">
        </div>

        <div class="control-group primary-control">
          <label for="indexAngle">Alhidade (Indexarm)</label>
          <input id="indexAngle" type="range" min="0" max="90" step="0.5" value="0">
        </div>

        <div class="control-group fine-control">
          <label for="micrometerMinutes">Mikrometer-Trommel</label>
          <span class="range-with-readout">
            <input id="micrometerMinutes" type="range" min="-30" max="30" step="0.1" value="0">
            <strong id="micrometerReadout">+0.0'</strong>
          </span>
        </div>

        <div class="two-column">
          <label>
            Beobachterhöhe
            <span class="inline-input">
              <input id="observerHeight" type="number" min="0" max="60" step="0.1" value="2.0">
              <span>m</span>
            </span>
          </label>
          <label>
            Indexfehler
            <span class="inline-input">
              <input id="indexError" type="number" step="0.1" value="0.0">
              <span>'</span>
            </span>
          </label>
        </div>

        <div class="result-panel">
          <button id="saveMeasurement" type="button">Messung speichern</button>
        </div>
      </section>

      <section class="almanac is-collapsed" aria-label="Almanach">
        <div class="section-title">
          <div>
            <p class="eyebrow">Almanach</p>
            <h2>Beobachterdaten</h2>
          </div>
          <button id="toggleAlmanac" type="button" aria-expanded="false" aria-controls="almanacContent">Ausklappen</button>
        </div>

        <div class="almanac-content" id="almanacContent">
          <div class="almanac-toolbar">
            <button id="useCurrentTime" type="button">Jetzt</button>
          </div>

          <div class="coordinate-grid">
            <label>
              Lat deg
              <input id="latitudeDeg" type="number" min="0" max="90" step="1" value="53">
            </label>
            <label>
              Lat min
              <input id="latitudeMin" type="number" min="0" max="59.999" step="0.001" value="33.066">
            </label>
            <label>
              N/S
              <select id="latitudeHemisphere">
                <option value="N">N</option>
                <option value="S">S</option>
              </select>
            </label>
            <label>
              Lon deg
              <input id="longitudeDeg" type="number" min="0" max="180" step="1" value="9">
            </label>
            <label>
              Lon min
              <input id="longitudeMin" type="number" min="0" max="59.999" step="0.001" value="59.622">
            </label>
            <label>
              E/W
              <select id="longitudeHemisphere">
                <option value="E">E</option>
                <option value="W">W</option>
              </select>
            </label>
            <label>
              UTC
              <input id="utcTime" type="datetime-local">
            </label>
          </div>
        </div>
      </section>

      <section class="logbook" aria-label="Messprotokoll">
        <div class="section-title">
          <h2>Messprotokoll</h2>
          <button id="clearLog" type="button">Leeren</button>
        </div>
        <ol id="measurementList" class="measurement-list"></ol>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
